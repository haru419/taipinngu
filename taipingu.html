<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>タイピングゲーム</title>

<style>

body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:700px;
    background:#1e293b;
    padding:30px;
    border-radius:20px;
    text-align:center;
}

.word{
    font-size:60px;
    color:#38bdf8;
    margin:30px 0;
}

input{
    width:80%;
    padding:15px;
    font-size:24px;
    border:none;
    border-radius:10px;
    text-align:center;
}

button{
    margin-top:20px;
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    color:white;
    cursor:pointer;
}

.combo{
    margin-top:20px;
    font-size:40px;
    color:gold;
    font-weight:bold;
}

.info{
    margin-top:20px;
    font-size:24px;
}

</style>
</head>

<body>

<div class="container">

    <h1>⌨ タイピングゲーム</h1>

    <div class="word" id="word">
        START
    </div>

    <input
        id="input"
        type="text"
        placeholder="ここに入力"
    >

    <div class="combo" id="combo">
        🔥0 COMBO
    </div>

    <div class="info">

        スコア :
        <span id="score">0</span>

        <br><br>

        時間 :
        <span id="time">30</span>

    </div>

    <button onclick="startGame()">
        スタート
    </button>

</div>

<script>

const words = [
    "apple",
    "banana",
    "orange",
    "typing",
    "game",
    "anime",
    "computer"
];

let currentWord = "";

let score = 0;

let combo = 0;

let time = 30;

let timer;

let playing = false;

const wordEl =
document.getElementById("word");

const inputEl =
document.getElementById("input");

const scoreEl =
document.getElementById("score");

const comboEl =
document.getElementById("combo");

const timeEl =
document.getElementById("time");

function randomWord(){

    return words[
        Math.floor(Math.random()*words.length)
    ];
}

function showWord(){

    currentWord = randomWord();

    wordEl.textContent = currentWord;
}

function startGame(){

    score = 0;

    combo = 0;

    time = 30;

    playing = true;

    scoreEl.textContent = score;

    comboEl.textContent =
    "🔥0 COMBO";

    timeEl.textContent = time;

    showWord();

    inputEl.value = "";

    inputEl.focus();

    clearInterval(timer);

    timer = setInterval(()=>{

        time--;

        timeEl.textContent = time;

        if(time <= 0){

            clearInterval(timer);

            playing = false;

            alert(
                "ゲーム終了！ スコア：" + score
            );
        }

    },1000);
}

inputEl.addEventListener("input",()=>{

    if(!playing) return;

    if(inputEl.value === currentWord){

        combo++;

        score++;

        scoreEl.textContent = score;

        comboEl.textContent =
        "🔥" + combo + " COMBO";

        inputEl.value = "";

        showWord();
    }

});

</script>

</body>
</html>
