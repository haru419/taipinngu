<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コンボ付きタイピングゲーム</title>

<style>

body{
    margin:0;
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:sans-serif;
    color:white;
}

.container{
    width:90%;
    max-width:800px;
    background:rgba(255,255,255,0.08);
    padding:30px;
    border-radius:25px;
    text-align:center;
}

.word{
    font-size:3rem;
    color:#38bdf8;
    margin:30px 0;
    font-weight:bold;
}

input{
    width:80%;
    padding:15px;
    border:none;
    border-radius:15px;
    font-size:1.2rem;
    text-align:center;
}

button{
    margin-top:20px;
    padding:15px 30px;
    border:none;
    border-radius:15px;
    background:#38bdf8;
    color:white;
    cursor:pointer;
}

.info{
    display:flex;
    justify-content:space-around;
    margin-top:20px;
    font-size:1.2rem;
}

.combo{
    font-size:2rem;
    color:#facc15;
    margin-top:20px;
    font-weight:bold;
    animation:none;
}

.combo.active{
    animation:comboAnim 0.3s;
}

@keyframes comboAnim{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.4);
    }

    100%{
        transform:scale(1);
    }
}

.effect{
    position:fixed;
    font-size:2rem;
    animation:floatUp 1s forwards;
    pointer-events:none;
}

@keyframes floatUp{

    from{
        opacity:1;
        transform:translateY(0);
    }

    to{
        opacity:0;
        transform:translateY(-100px);
    }
}

</style>
</head>

<body>

<div class="container">

    <h1>⌨ タイピングゲーム</h1>

    <input
        type="text"
        id="playerName"
        placeholder="名前を入力"
    >

    <div class="word" id="word">
        START
    </div>

    <input
        type="text"
        id="input"
        placeholder="ここに入力"
    >

    <div class="combo" id="combo">
        🔥 0 COMBO
    </div>

    <div class="info">

        <div>
            スコア :
            <span id="score">0</span>
        </div>

        <div>
            残り時間 :
            <span id="time">30</span>
        </div>

    </div>

    <button onclick="startGame()">
        ゲームスタート
    </button>

    <h2 id="gameover"></h2>

</div>

<script>

const words = [
    "apple",
    "banana",
    "orange",
    "typing",
    "javascript",
    "computer",
    "anime",
    "game"
];

const wordEl =
document.getElementById("word");

const inputEl =
document.getElementById("input");

const scoreEl =
document.getElementById("score");

const timeEl =
document.getElementById("time");

const comboEl =
document.getElementById("combo");

const gameoverEl =
document.getElementById("gameover");

let currentWord = "";

let score = 0;

let combo = 0;

let time = 30;

let timer;

let playing = false;

function randomWord(){

    return words[
        Math.floor(Math.random()*words.length)
    ];
}

function showWord(){

    currentWord = randomWord();

    wordEl.textContent = currentWord;
}

function startGame(){

    score = 0;

    combo = 0;

    time = 30;

    playing = true;

    scoreEl.textContent = score;

    timeEl.textContent = time;

    comboEl.textContent =
    "🔥 0 COMBO";

    gameoverEl.textContent = "";

    showWord();

    inputEl.value = "";

    inputEl.focus();

    clearInterval(timer);

    timer = setInterval(()=>{

        time--;

        timeEl.textContent = time;

        if(time <= 0){

            clearInterval(timer);

            playing = false;

            gameoverEl.textContent =
            "ゲーム終了！";
        }

    },1000);
}

inputEl.addEventListener("input",()=>{

    if(!playing) return;

    if(inputEl.value === currentWord){

        combo++;

        score += 1 + Math.floor(combo / 5);

        scoreEl.textContent = score;

        comboEl.textContent =
        "🔥 " + combo + " COMBO";

        comboEl.classList.remove("active");

        void comboEl.offsetWidth;

        comboEl.classList.add("active");

        createEffect();

        inputEl.value = "";

        showWord();

        time += 1;

        timeEl.textContent = time;
    }

});

function createEffect(){

    const effect =
    document.createElement("div");

    effect.className = "effect";

    effect.innerHTML =
    "🔥 COMBO";

    effect.style.left =
    (window.innerWidth/2 - 50) + "px";

    effect.style.top =
    (window.innerHeight/2) + "px";

    document.body.appendChild(effect);

    setTimeout(()=>{

        effect.remove();

    },1000);
}

</script>

</body>
</html>
