<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コンボ付きタイピングゲーム</title>

<style>

body{
    margin:0;
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:sans-serif;
    color:white;
    overflow:auto;
}

.container{
    width:90%;
    max-width:800px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    padding:30px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,0.4);
    margin:20px 0;
}

h1{
    font-size:3rem;
    margin-bottom:20px;
}

.word{
    font-size:3.2rem;
    color:#38bdf8;
    margin:30px 0;
    font-weight:bold;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:0 0 10px #38bdf8;
    }
    to{
        text-shadow:0 0 35px #38bdf8;
    }
}

input{
    width:80%;
    padding:15px;
    border:none;
    border-radius:15px;
    font-size:1.2rem;
    text-align:center;
}

button{
    margin-top:20px;
    padding:15px 30px;
    border:none;
    border-radius:15px;
    background:#38bdf8;
    color:white;
    font-size:1rem;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.info{
    display:flex;
    justify-content:space-around;
    margin-top:20px;
    font-size:1.2rem;
}

.combo{
    margin-top:20px;
    font-size:2rem;
    font-weight:bold;
    color:#facc15;
    opacity:0;
    transform:scale(0.5);
    transition:0.2s;
}

.combo.show{
    opacity:1;
    transform:scale(1.2);
    animation:pulse 0.4s;
}

@keyframes pulse{
    0%{
        transform:scale(0.5);
    }

    50%{
        transform:scale(1.4);
    }

    100%{
        transform:scale(1.2);
    }
}

.ranking{
    margin-top:40px;
    text-align:left;
}

.rankItem{
    background:rgba(255,255,255,0.08);
    padding:12px;
    border-radius:10px;
    margin-top:10px;
    display:flex;
    justify-content:space-between;
}

.gameover{
    margin-top:20px;
    font-size:2rem;
    color:#f87171;
}

.nameBox{
    margin-bottom:20px;
}

.effect{
    position:fixed;
    font-size:2rem;
    pointer-events:none;
    animation:fly 1s forwards;
}

@keyframes fly{

    0%{
        opacity:1;
        transform:translateY(0);
    }

    100%{
        opacity:0;
        transform:translateY(-120px);
    }
}

</style>
</head>

<body>

<div class="container">

    <h1>⌨ タイピングゲーム</h1>

    <div class="nameBox">

        <input
            type="text"
            id="playerName"
            placeholder="名前を入力"
        >

    </div>

    <div class="word" id="word">
        START
    </div>

    <input
        type="text"
        id="input"
        placeholder="ここに入力"
    >

    <div class="combo" id="combo">
        🔥 0 COMBO
    </div>

    <div class="info">

        <div>
            スコア :
            <span id="score">0</span>
        </div>

        <div>
            残り時間 :
            <span id="time">30</span>
        </div>

    </div>

    <button onclick="startGame()">
        ゲームスタート
    </button>

    <div class="gameover" id="gameover"></div>

    <div class="ranking">

        <h2>🌍 世界ランキング</h2>

        <div id="ranking"></div>

    </div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbyp7pJQzx_zpgLc_LT0Yyv21mSwPAc754M1RouUmIaz7ksixOYxBMCKqq6-8q12fdge/exec";

const words = [
    "apple",
    "banana",
    "orange",
    "typing",
    "javascript",
    "computer",
    "internet",
    "school",
    "anime",
    "pokemon",
    "challenge",
    "keyboard",
    "speed",
    "game"
];

const wordEl =
document.getElementById("word");

const inputEl =
document.getElementById("input");

const scoreEl =
document.getElementById("score");

const timeEl =
document.getElementById("time");

const rankingEl =
document.getElementById("ranking");

const gameoverEl =
document.getElementById("gameover");

const comboEl =
document.getElementById("combo");

let currentWord = "";

let score = 0;

let combo = 0;

let time = 30;

let timer;

let playing = false;

function randomWord(){

    return words[
        Math.floor(Math.random()*words.length)
    ];
}

function showWord(){

    currentWord = randomWord();

    wordEl.textContent = currentWord;
}

function startGame(){

    score = 0;

    combo = 0;

    time = 30;

    playing = true;

    scoreEl.textContent = score;

    timeEl.textContent = time;

    comboEl.textContent =
    "🔥 0 COMBO";

    gameoverEl.textContent = "";

    showWord();

    inputEl.value = "";

    inputEl.focus();

    clearInterval(timer);

    timer = setInterval(async ()=>{

        time--;

        timeEl.textContent = time;

        if(time <= 0){

            clearInterval(timer);

            playing = false;

            gameoverEl.textContent =
            "ゲーム終了！";

            await autoSave();
        }

    },1000);
}

inputEl.addEventListener("input",()=>{

    if(!playing) return;

    if(inputEl.value === currentWord){

        combo++;

        score += 1 + Math.floor(combo / 5);

        scoreEl.textContent = score;

        comboEl.textContent =
        "🔥 " + combo + " COMBO";

        comboEl.classList.add("show");

        setTimeout(()=>{

            comboEl.classList.remove("show");

        },200);

        createEffect();

        inputEl.value = "";

        showWord();

        time += 1;

        timeEl.textContent = time;
    }

});

function createEffect(){

    const effect =
    document.createElement("div");

    effect.className = "effect";

    effect.innerHTML = "🔥+" + combo;

    effect.style.left =
    (window.innerWidth/2 - 30) + "px";

    effect.style.top =
    (window.innerHeight/2) + "px";

    document.body.appendChild(effect);

    setTimeout(()=>{

        effect.remove();

    },1000);
}

async function autoSave(){

    const name =
    document.getElementById("playerName")
    .value || "名無し";

    await fetch(API_URL,{

        method:"POST",

        body:JSON.stringify({

            name:name,

            score:score

        })

    });

    gameoverEl.textContent =
    "ゲーム終了！ ランキング保存完了！";

    loadRanking();
}

async function loadRanking(){

    const response =
    await fetch(API_URL);

    const data =
    await response.json();

    rankingEl.innerHTML = "";

    data.forEach((player,index)=>{

        let crown = "";

        if(index === 0){
            crown = "👑";
        }

        rankingEl.innerHTML += `

        <div class="rankItem">

            <span>
                ${crown}
                ${index+1}位
                ${player[0]}
            </span>

            <span>
                ${player[1]}
            </span>

        </div>

        `;
    });
}

loadRanking();

</script>

</body>
</html>
