<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>タイピングゲーム</title>

<style>

body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:700px;
    background:#1e293b;
    padding:30px;
    border-radius:20px;
    text-align:center;
}

.word{
    font-size:60px;
    color:#38bdf8;
    margin:30px 0;
}

input{
    width:80%;
    padding:15px;
    font-size:24px;
    border:none;
    border-radius:10px;
    text-align:center;
}

button{
    margin-top:20px;
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    color:white;
    cursor:pointer;
}

.combo{
    margin-top:20px;
    font-size:40px;
    color:gold;
    font-weight:bold;
}

.info{
    margin-top:20px;
    font-size:24px;
}

#ranking{
    margin-top:20px;
}

.rankItem{
    margin:10px;
    font-size:24px;
}

</style>
</head>

<body>

<div class="container">

    <h1>⌨ タイピングゲーム</h1>

    <div class="word" id="word">
        START
    </div>

    <input
        id="input"
        type="text"
        placeholder="ここに入力"
    >

    <div class="combo" id="combo">
        🔥0 COMBO
    </div>

    <div class="info">

        スコア :
        <span id="score">0</span>

        <br><br>

        時間 :
        <span id="time">30</span>

    </div>

    <button onclick="startGame()">
        スタート
    </button>

    <h2>🏆 ランキング</h2>

    <div id="ranking">
        読み込み中...
    </div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    query,
    orderBy,
    limit,
    getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

    apiKey: "AIzaSyBc30xUy5mXqDegHSNiYllEsJXJ66BjwF4",
    authDomain: "rankingtaipingu.firebaseapp.com",
    projectId: "rankingtaipingu",

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const words = [
    "apple",
    "banana",
    "orange",
    "typing",
    "game",
    "anime",
    "computer"
];

let currentWord = "";
let score = 0;
let combo = 0;
let time = 30;
let timer;
let playing = false;

const wordEl = document.getElementById("word");
const inputEl = document.getElementById("input");
const scoreEl = document.getElementById("score");
const comboEl = document.getElementById("combo");
const timeEl = document.getElementById("time");

function randomWord(){

    return words[
        Math.floor(Math.random() * words.length)
    ];

}

function showWord(){

    currentWord = randomWord();

    wordEl.textContent = currentWord;

}

window.startGame = function(){

    score = 0;
    combo = 0;
    time = 30;
    playing = true;

    scoreEl.textContent = score;
    comboEl.textContent = "🔥0 COMBO";
    timeEl.textContent = time;

    showWord();

    inputEl.value = "";
    inputEl.focus();

    clearInterval(timer);

    timer = setInterval(async ()=>{

        time--;

        timeEl.textContent = time;

        if(time <= 0){

            clearInterval(timer);

            playing = false;

            const name =
            prompt("名前を入力してください");

            if(name){

                await addDoc(
                    collection(db,"ranking"),
                    {
                        name:name,
                        score:score,
                        created:Date.now()
                    }
                );

            }

            loadRanking();

            alert(
                "ゲーム終了！ スコア：" + score
            );

        }

    },1000);

}

inputEl.addEventListener("input",()=>{

    if(!playing) return;

    if(inputEl.value === currentWord){

        combo++;
        score++;

        scoreEl.textContent = score;

        comboEl.textContent =
        "🔥" + combo + " COMBO";

        inputEl.value = "";

        showWord();

    }

});

async function loadRanking(){

    const rankingEl =
    document.getElementById("ranking");

    rankingEl.innerHTML =
    "読み込み中...";

    const q = query(
        collection(db,"ranking"),
        orderBy("score","desc"),
        limit(10)
    );

    const querySnapshot =
    await getDocs(q);

    rankingEl.innerHTML = "";

    let rank = 1;

    querySnapshot.forEach((doc)=>{

        const data = doc.data();

        rankingEl.innerHTML += `
        <div class="rankItem">
            🏆 ${rank}位 :
            ${data.name}
            - ${data.score}
        </div>
        `;

        rank++;

    });

}

loadRanking();

</script>

</body>
</html>
